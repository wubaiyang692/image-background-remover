<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>CET-4 单词连连看</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); min-height:100vh; display:flex; flex-direction:column; align-items:center; font-family:'Microsoft YaHei',sans-serif; color:#fff; }
h1 { margin:20px 0 4px; font-size:26px; letter-spacing:2px; color:#e0c97f; text-shadow:0 0 20px rgba(224,201,127,0.5); }
#subtitle { font-size:13px; color:#aaa; margin-bottom:12px; }
#stats { display:flex; gap:30px; margin-bottom:14px; font-size:15px; }
#stats span { background:rgba(255,255,255,0.08); padding:6px 18px; border-radius:20px; }
#stats .val { color:#e0c97f; font-weight:bold; }
#game-area { display:flex; gap:24px; align-items:flex-start; }
.col { display:flex; flex-direction:column; gap:10px; }
.card {
  width:160px; padding:12px 16px; border-radius:10px; cursor:pointer;
  font-size:14px; text-align:center; user-select:none;
  border:2px solid transparent; transition:all .15s;
  position:relative; overflow:hidden;
}
.card.english { background:rgba(52,152,219,0.2); border-color:rgba(52,152,219,0.4); color:#7ec8e3; }
.card.chinese { background:rgba(46,204,113,0.2); border-color:rgba(46,204,113,0.4); color:#a8e6cf; }
.card:hover { transform:translateY(-2px); box-shadow:0 4px 20px rgba(255,255,255,0.1); }
.card.selected { border-color:#e0c97f; background:rgba(224,201,127,0.25); color:#fff; transform:scale(1.04); box-shadow:0 0 16px rgba(224,201,127,0.4); }
.card.matched { opacity:0; pointer-events:none; transform:scale(0.8); transition:all .4s; }
.card.wrong { border-color:#e74c3c; background:rgba(231,76,60,0.3); animation:shake .3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
#msg { margin-top:16px; font-size:18px; min-height:28px; color:#e0c97f; letter-spacing:1px; }
#controls { margin-top:16px; display:flex; gap:12px; }
button { padding:10px 28px; border:none; border-radius:24px; font-size:15px; cursor:pointer; font-family:inherit; transition:all .2s; }
#btn-next { background:linear-gradient(135deg,#e0c97f,#c9a227); color:#1a1a2e; font-weight:bold; }
#btn-next:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(224,201,127,0.4); }
#btn-restart { background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); }
#btn-restart:hover { background:rgba(255,255,255,0.2); }
#progress { width:360px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; margin-bottom:10px; overflow:hidden; }
#progress-bar { height:100%; background:linear-gradient(90deg,#e0c97f,#c9a227); border-radius:3px; transition:width .4s; }
#combo { font-size:13px; color:#aaa; min-height:20px; }
.combo-flash { color:#ff6b6b; font-weight:bold; animation:pop .4s; }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
</style>
</head>
<body>
<h1>🎓 CET-4 单词连连看</h1>
<div id="subtitle">点击英文单词，再点击对应的中文释义</div>
<div id="progress"><div id="progress-bar" style="width:0%"></div></div>
<div id="stats">
  <span>得分 <span class="val" id="score">0</span></span>
  <span>关卡 <span class="val" id="level">1</span></span>
  <span>时间 <span class="val" id="timer">60</span>s</span>
  <span>连击 <span class="val" id="combo-val">0</span></span>
</div>
<div id="combo"></div>
<div id="game-area">
  <div class="col" id="col-en"></div>
  <div class="col" id="col-zh"></div>
</div>
<div id="msg"></div>
<div id="controls">
  <button id="btn-next" onclick="nextRound()" style="display:none">下一关 →</button>
  <button id="btn-restart" onclick="restart()">重新开始</button>
</div>

  {en:'reflect',zh:'反映；反思'},
  {en:'relevant',zh:'相关的'},
  {en:'rely',zh:'依赖'},
  {en:'require',zh:'需要'},
  {en:'resolve',zh:'解决'},
  {en:'respond',zh:'回应'},
  {en:'reveal',zh:'揭示'},
  {en:'significant',zh:'重要的；显著的'},
  {en:'similar',zh:'相似的'},
  {en:'specific',zh:'具体的'},
  {en:'strategy',zh:'策略'},
  {en:'strengthen',zh:'加强'},
  {en:'sufficient',zh:'足够的'},
  {en:'suggest',zh:'建议；暗示'},
  {en:'support',zh:'支持'},
  {en:'survive',zh:'生存'},
  {en:'sustainable',zh:'可持续的'},
  {en:'tendency',zh:'趋势；倾向'},
  {en:'transform',zh:'转变'},
  {en:'typical',zh:'典型的'},
  {en:'unique',zh:'独特的'},
  {en:'utilize',zh:'利用'},
  {en:'various',zh:'各种各样的'},
  {en:'vital',zh:'至关重要的'},
  {en:'voluntary',zh:'自愿的'},
];

const PER_ROUND = 8;
let score=0, level=1, combo=0, timerVal=60, timerInterval=null;
let pool=[], roundWords=[], selectedEn=null, selectedZh=null;
let matched=0, total=0;

function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

function startTimer(){
  clearInterval(timerInterval);
  timerVal=60;
  document.getElementById('timer').textContent=timerVal;
  timerInterval=setInterval(()=>{
    timerVal--;
    document.getElementById('timer').textContent=timerVal;
    if(timerVal<=0){ clearInterval(timerInterval); timeUp(); }
  },1000);
}

function timeUp(){
  showMsg('⏰ 时间到！得分：'+score);
  document.getElementById('btn-next').style.display='none';
  disableAll();
}

function disableAll(){
  document.querySelectorAll('.card').forEach(c=>c.style.pointerEvents='none');
}

function initPool(){
  pool=shuffle([...WORDS]);
  total=pool.length;
}

function nextRound(){
  document.getElementById('btn-next').style.display='none';
  showMsg('');
  level++;
  document.getElementById('level').textContent=level;
  renderRound();
  startTimer();
}

function renderRound(){
  roundWords=pool.splice(0,PER_ROUND);
  if(roundWords.length===0){ gameComplete(); return; }
  matched=0;
  selectedEn=null; selectedZh=null;

  const enWords=shuffle([...roundWords]);
  const zhWords=shuffle([...roundWords]);

  const colEn=document.getElementById('col-en');
  const colZh=document.getElementById('col-zh');
  colEn.innerHTML=''; colZh.innerHTML='';

  enWords.forEach(w=>{
    const d=document.createElement('div');
    d.className='card english'; d.textContent=w.en; d.dataset.key=w.en;
    d.onclick=()=>selectEn(d,w);
    colEn.appendChild(d);
  });
  zhWords.forEach(w=>{
    const d=document.createElement('div');
    d.className='card chinese'; d.textContent=w.zh; d.dataset.key=w.en;
    d.onclick=()=>selectZh(d,w);
    colZh.appendChild(d);
  });

  updateProgress();
}

function selectEn(el,w){
  if(el.classList.contains('matched')) return;
  document.querySelectorAll('.card.english').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  selectedEn={el,w};
  if(selectedZh) check();
}

function selectZh(el,w){
  if(el.classList.contains('matched')) return;
  document.querySelectorAll('.card.chinese').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  selectedZh={el,w};
  if(selectedEn) check();
}

function check(){
  const en=selectedEn, zh=selectedZh;
  selectedEn=null; selectedZh=null;
  if(en.w.en===zh.w.en){
    // correct
    combo++;
    const bonus=combo>=3?combo*20:10;
    score+=bonus;
    document.getElementById('score').textContent=score;
    document.getElementById('combo-val').textContent=combo;
    en.el.classList.add('matched');
    zh.el.classList.add('matched');
    matched++;
    showCombo(combo,bonus);
    if(matched===roundWords.length){
      clearInterval(timerInterval);
      score+=timerVal*2; // time bonus
      document.getElementById('score').textContent=score;
      setTimeout(()=>{
        if(pool.length>0){
          showMsg('🎉 本关完成！时间奖励 +'+(timerVal*2));
          document.getElementById('btn-next').style.display='inline-block';
        } else { gameComplete(); }
      },400);
    }
  } else {
    // wrong
    combo=0;
    document.getElementById('combo-val').textContent=0;
    en.el.classList.add('wrong'); zh.el.classList.add('wrong');
    setTimeout(()=>{
      en.el.classList.remove('wrong','selected');
      zh.el.classList.remove('wrong','selected');
    },500);
  }
}

function showCombo(c,bonus){
  const el=document.getElementById('combo');
  if(c>=5) el.textContent='🔥 '+c+'连击！+'+bonus;
  else if(c>=3) el.textContent='⚡ '+c+'连击！+'+bonus;
  else el.textContent='+'+bonus;
  el.className='combo-flash';
  setTimeout(()=>{ el.className=''; el.textContent=''; },800);
}

function showMsg(t){ document.getElementById('msg').textContent=t; }

function updateProgress(){
  const done=total-pool.length-roundWords.length;
  const pct=Math.round(done/total*100);
  document.getElementById('progress-bar').style.width=pct+'%';
}

function gameComplete(){
  clearInterval(timerInterval);
  showMsg('🏆 全部完成！最终得分：'+score);
  document.getElementById('btn-next').style.display='none';
  disableAll();
}

function restart(){
  clearInterval(timerInterval);
  score=0; level=1; combo=0;
  document.getElementById('score').textContent=0;
  document.getElementById('level').textContent=1;
  document.getElementById('combo-val').textContent=0;
  document.getElementById('btn-next').style.display='none';
  showMsg('');
  initPool();
  renderRound();
  startTimer();
}

initPool();
renderRound();
startTimer();
</script>

</html>
